<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Filesfy - Recuperação de Dados</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="theme-light">
  <div id="app">
    <header class="app-header">
      <div class="header-left">
        <img src="../filesfyfrontend/src/images/FilesFy.png" alt="Filesfy Logo" class="logo-image-desktop" onerror="this.style.display='none'">
        <h1>Filesfy - Recuperação de Dados</h1>
      </div>
      <div class="header-right">
        <span id="user-info" class="user-info" hidden></span>
        <button id="logout-btn" class="btn-logout" hidden>Sair</button>
      </div>
    </header>

    <main id="wizard"></main>

    <footer class="app-footer">
      <p>© 2026 Filesfy Inc. Todos os direitos reservados.</p>
    </footer>
  </div>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="./electron-renderer.js"></script>
</body>
</html>
