<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Filesfy - Recuperação de Dados</title>
  <link rel="stylesheet" href="./styles.css" />
  <link rel="stylesheet" href="./fontawesome/css/all.min.css" />
</head>
<body class="theme-light">
  <div id="app">
    <header class="app-header">
      <div class="header-left">
        <img src="./images/FilesFy.png" alt="Filesfy Logo" class="logo-image-desktop" onerror="this.style.display='none'">
        <h1>Filesfy - Recuperação de Dados</h1>
      </div>
      <div class="header-right">
        <span class="app-version">v1.0.0</span>
      </div>
    </header>

    <main id="wizard"></main>

    <footer class="app-footer">
      <p>© 2026 Filesfy Inc. Todos os direitos reservados.</p>
      <div class="footer-links">
        <button class="footer-link" onclick="window.electronAPI.openLegal('privacy')">Política de Privacidade</button>
        <span class="footer-sep">·</span>
        <button class="footer-link" onclick="window.electronAPI.openLegal('license')">Contrato de Licença</button>
        <span class="footer-sep">·</span>
        <button class="footer-link" onclick="window.electronAPI.openLegal('terms')">Termos e Condições</button>
      </div>
    </footer>
  </div>

  <script src="./electron-renderer.js"></script>
</body>
</html>
